<section class="infra-section">
  <div class="infra-container">
    <div class="infra-header">
      <h2 class="infra-title">{{ 'INFRA.TITLE' | translate }}</h2>
      <div class="infra-search">
        <mat-icon class="search-icon">search</mat-icon>
        <input
          class="search-input"
          type="text"
          [(ngModel)]="filterText"
          [placeholder]="'INFRA.SEARCH_PLACEHOLDER' | translate"
          autocomplete="off"
        />
        <button class="search-clear" *ngIf="filterText" (click)="filterText = ''" [title]="'INFRA.SEARCH_CLEAR' | translate">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div class="infra-loading" *ngIf="loading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>

    <!-- Error -->
    <div class="infra-error" *ngIf="error && !loading">
      <mat-icon>warning_amber</mat-icon>
      <span>{{ 'INFRA.ERROR_MSG' | translate }}</span>
      <button (click)="loadProjects()">{{ 'INFRA.RETRY' | translate }}</button>
    </div>

    <!-- Grid de proyectos -->
    <div class="infra-grid" *ngIf="!loading && !error">
      <div class="infra-card" *ngFor="let p of filteredProjects">
        <div class="infra-top">
          <div class="project-name">
            <strong>{{ p.name }}</strong>
            <span class="project-code" *ngIf="p.code">{{ p.code }}</span>
          </div>
          <div
            class="traffic-light"
            [ngClass]="{
              'up': p.status === 'UP',
              'warn': p.status === 'WARN',
              'down': p.status === 'DOWN'
            }">
            <svg viewBox="0 0 64 160" class="tl-svg" aria-hidden="true">
              <rect x="4" y="4" width="56" height="152" rx="10" fill="#111" stroke="#333" stroke-width="2"></rect>
              <circle cx="32" cy="40" r="14" class="light red" />
              <circle cx="32" cy="80" r="14" class="light yellow" />
              <circle cx="32" cy="120" r="14" class="light green" />
            </svg>
          </div>
        </div>

        <div class="infra-meta">
          <span class="status-label">{{ ('INFRA.STATUS_' + p.status) | translate }}</span>
          <button
            class="check-btn"
            [class.checking]="p.checking"
            [disabled]="p.checking"
            (click)="checkProject(p)"
            [title]="'INFRA.CHECK_TITLE' | translate">
            <mat-icon class="check-icon">{{ p.checking ? 'hourglass_top' : 'wifi_tethering' }}</mat-icon>
            <span>{{ (p.checking ? 'INFRA.CHECKING' : 'INFRA.CHECK') | translate }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Sin proyectos -->
    <div class="infra-empty" *ngIf="!loading && !error && filteredProjects.length === 0">
      <ng-container *ngIf="projects.length === 0">{{ 'INFRA.EMPTY' | translate }}</ng-container>
      <ng-container *ngIf="projects.length > 0">{{ 'INFRA.NO_RESULTS' | translate }} "{{ filterText }}"</ng-container>
    </div>
  </div>
</section>
