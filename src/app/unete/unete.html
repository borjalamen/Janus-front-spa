<div class="unete-root">
  <h2>{{ 'MENU.JOIN' | translate }}</h2>

  <div class="form-card">
    <div class="row">
      <mat-form-field appearance="outline">
        <input
          matInput
          placeholder="{{ 'UNETE.FULLNAME' | translate }}"
          name="fullName"
          [(ngModel)]="form.fullName"
          (ngModelChange)="onFormChange()"
        />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <input
          matInput
          type="email"
          placeholder="{{ 'UNETE.EMAIL' | translate }}"
          name="email"
          [(ngModel)]="form.email"
          (ngModelChange)="onFormChange()"
        />
      </mat-form-field>
    </div>

    <div class="row">
      <mat-form-field appearance="outline" class="full">
        <textarea
          matInput
          rows="5"
          placeholder="{{ 'UNETE.COMMENTS' | translate }}"
          name="comments"
          [(ngModel)]="form.comments"
          (ngModelChange)="onFormChange()"
        ></textarea>
      </mat-form-field>
    </div>

    <div class="actions">
      <button
        type="button"
        class="action-btn"
        (click)="sendMail()"
        [disabled]="!form.fullName || !form.email || sending"
        aria-label="{{ 'UNETE.SEND_BY_MAIL' | translate }}"
      >
        <mat-icon>{{ sending ? 'hourglass_empty' : 'send' }}</mat-icon>
        {{ sending ? ('UNETE.SENDING' | translate) : ('UNETE.SEND_BY_MAIL' | translate) }}
      </button>

      <button
        type="button"
        class="action-btn"
        (click)="resetForm()"
        [disabled]="sending"
        aria-label="{{ 'UNETE.RESET' | translate }}"
      >
        <img src="assets/images/Escova.png" class="btn-custom-img" alt="Limpiar" />
        {{ 'UNETE.RESET' | translate }}
      </button>
    </div>
  </div>
</div>

<!-- Credentials popup -->
<div class="modal-overlay" *ngIf="mostrarPopupCredenciales && credencialesPopup">
  <div class="auth-card">
    <h2 class="form-title">✅ Solicitud enviada</h2>
    <p class="popup-desc">Tu solicitud ha sido recibida. Accede con las credenciales cuando tu cuenta sea activada por un administrador.</p>
    <div class="popup-field">
      <label>👤 Usuario</label>
      <input type="text" [value]="credencialesPopup!.username" readonly class="popup-input" />
    </div>
    <div class="popup-field">
      <label>🔑 Contraseña</label>
      <input type="text" [value]="credencialesPopup!.password || '—'" readonly class="popup-input" />
    </div>
    <p class="popup-warn">⚠️ Guarda esta contraseña, no se volverá a mostrar.</p>
    <div class="popup-actions">
      <button class="btn-emoji confirm" (click)="cerrarPopupCredenciales()">✓</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="app-toast" *ngIf="toastMsg" [class.toast-err]="!toastOk">{{ toastMsg }}</div>
